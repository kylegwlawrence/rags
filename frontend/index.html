<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Datasets</title>
  <!-- Sync theme before paint to prevent flash in dark mode. -->
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="/ui/vendor/pico.classless.min.css">
  <link rel="stylesheet" href="/ui/vendor/katex/katex.min.css">
  <link rel="stylesheet" href="/ui/style.css">
  <!-- Markdown + math rendering for prose content (e.g. OpenStax sections).
       Loaded as classic scripts so they attach window.marked / window.katex /
       window.renderMathInElement before the deferred ES module runs. -->
  <script src="/ui/vendor/marked.min.js"></script>
  <script src="/ui/vendor/katex/katex.min.js"></script>
  <script src="/ui/vendor/katex/contrib/auto-render.min.js"></script>
  <script type="module" src="/ui/main.js"></script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
